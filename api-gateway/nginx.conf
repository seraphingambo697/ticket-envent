limit_req_zone $binary_remote_addr zone=auth_zone:10m     rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_zone:10m      rate=30r/s;
limit_req_zone $binary_remote_addr zone=purchase_zone:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    log_format gateway '[$time_local] [GATEWAY] $request_method "$request_uri" → $upstream_addr status=$status time=${upstream_response_time}s client=$remote_addr';
    access_log /var/log/nginx/gateway.log gateway;
    error_log  /var/log/nginx/error.log warn;

    location /api/auth/ {
        limit_req zone=auth_zone burst=10 nodelay;
        proxy_pass       http://auth-service:8000/api/auth/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID    $request_id;
    }

    location /api/events/ {
        limit_req zone=api_zone burst=50 nodelay;
        proxy_pass       http://event-service:8000/api/events/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID    $request_id;
    }

    location /api/tickets/ {
        limit_req zone=purchase_zone burst=15 nodelay;
        proxy_pass       http://ticket-service:8000/api/tickets/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID    $request_id;
    }

    location /api/users/ {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass       http://user-service:3001/api/users/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /docs/auth/    { proxy_pass http://auth-service:8000/api/docs/; }
    location /docs/events/  { proxy_pass http://event-service:8000/api/docs/; }
    location /docs/tickets/ { proxy_pass http://ticket-service:8000/api/docs/; }
    location /docs/users/   { proxy_pass http://user-service:3001/api/docs; }

    location /health {
        return 200 '{"status":"ok","service":"api-gateway"}';
        add_header Content-Type application/json;
    }
}
