worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format gateway '[$time_local] [GATEWAY] $request_method "$request_uri"'
                       ' -> $upstream_addr  status=$status'
                       ' time=${upstream_response_time}s client=$remote_addr';

    access_log /var/log/nginx/access.log gateway;
    error_log  /var/log/nginx/error.log warn;

    limit_req_zone $binary_remote_addr zone=auth_zone:10m     rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_zone:10m      rate=30r/s;
    limit_req_zone $binary_remote_addr zone=purchase_zone:10m rate=10r/s;

    upstream auth_service   { server auth-service:8000; }
    upstream event_service  { server event-service:8000; }
    upstream ticket_service { server ticket-service:8000; }
    upstream user_service   { server user-service:3001; }

    server {
        listen 80;
        server_name _;

        # NOTE : pas de add_header CORS ici.
        # Les headers CORS sont gérés par chaque service backend :
        #   - Django : django-cors-headers middleware
        #   - Node.js : middleware Express
        # Ajouter CORS ici ET dans les services créerait des headers dupliqués → erreur browser.

        # ── Auth — 5 req/s ────────────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth_zone burst=10 nodelay;
            proxy_pass         http://auth_service/api/auth/;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            # Passer le header Origin au service pour que cors-headers puisse répondre
            proxy_pass_header  Origin;
        }

        # ── Events — 30 req/s ─────────────────────────────────────────
        location /api/events/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass         http://event_service/api/events/;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass_header  Origin;
        }

        # ── Tickets — 10 req/s ────────────────────────────────────────
        location /api/tickets/ {
            limit_req zone=purchase_zone burst=15 nodelay;
            proxy_pass         http://ticket_service/api/tickets/;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass_header  Origin;
        }

        # ── Users — Node.js gère son propre CORS ──────────────────────
        location /api/users/ {
            limit_req zone=api_zone burst=20 nodelay;
            proxy_pass         http://user_service/api/users/;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass_header  Origin;
        }

        # ── Swagger docs ──────────────────────────────────────────────
        location /docs/auth/    { proxy_pass http://auth_service/api/docs/; }
        location /docs/events/  { proxy_pass http://event_service/api/docs/; }
        location /docs/tickets/ { proxy_pass http://ticket_service/api/docs/; }
        location /docs/users/   { proxy_pass http://user_service/api/docs; }

        # ── Health ────────────────────────────────────────────────────
        location /health {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"gateway"}';
        }
    }
}
