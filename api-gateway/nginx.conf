worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format gateway '[$time_local] [GATEWAY] $request_method "$request_uri"'
                       ' -> $upstream_addr  status=$status'
                       ' time=${upstream_response_time}s client=$remote_addr';

    access_log /var/log/nginx/access.log gateway;
    error_log  /var/log/nginx/error.log warn;

    limit_req_zone $binary_remote_addr zone=auth_zone:10m     rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_zone:10m      rate=30r/s;
    limit_req_zone $binary_remote_addr zone=purchase_zone:10m rate=10r/s;

    upstream auth_service   { server auth-service:8000; }
    upstream event_service  { server event-service:8000; }
    upstream ticket_service { server ticket-service:8000; }
    upstream user_service   { server user-service:3001; }

    # ── Macro CORS ────────────────────────────────────────────────────────
    # Répond aux OPTIONS preflight et ajoute les headers sur chaque réponse
    map $request_method $cors_method {
        OPTIONS 1;
        default 0;
    }

    server {
        listen 80;
        server_name _;

        # Headers CORS globaux
        add_header 'Access-Control-Allow-Origin'  'http://localhost:5173' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Request-ID' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # ── Preflight OPTIONS — répondre immédiatement 204 ─────────────
        location / {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  'http://localhost:5173';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # ── Auth ──────────────────────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth_zone burst=10 nodelay;
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  'http://localhost:5173';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                return 204;
            }
            proxy_pass       http://auth_service/api/auth/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Events ────────────────────────────────────────────────────
        location /api/events/ {
            limit_req zone=api_zone burst=50 nodelay;
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  'http://localhost:5173';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                return 204;
            }
            proxy_pass       http://event_service/api/events/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Tickets ───────────────────────────────────────────────────
        location /api/tickets/ {
            limit_req zone=purchase_zone burst=15 nodelay;
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  'http://localhost:5173';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                return 204;
            }
            proxy_pass       http://ticket_service/api/tickets/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Users ─────────────────────────────────────────────────────
        location /api/users/ {
            limit_req zone=api_zone burst=20 nodelay;
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  'http://localhost:5173';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                return 204;
            }
            proxy_pass       http://user_service/api/users/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Swagger docs ──────────────────────────────────────────────
        location /docs/auth/    { proxy_pass http://auth_service/api/docs/; }
        location /docs/events/  { proxy_pass http://event_service/api/docs/; }
        location /docs/tickets/ { proxy_pass http://ticket_service/api/docs/; }
        location /docs/users/   { proxy_pass http://user_service/api/docs; }

        # ── Health ────────────────────────────────────────────────────
        location /health {
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }
    }
}
