version: '3.9'

services:

  # ─── Infrastructure ───────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ticketing
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ticketing"]
      interval: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "15672:15672"   # Management UI → http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ─── Services ─────────────────────────────────────────────────────────────

  auth-service:
    build: ./auth-service
    environment:
      DATABASE_URL: postgres://admin:admin@postgres:5432/ticketing
      SECRET_KEY: super-secret-key-change-in-prod
      DEBUG: "True"
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  event-service:
    build: ./event-service
    environment:
      DATABASE_URL: postgres://admin:admin@postgres:5432/ticketing
      SECRET_KEY: super-secret-key-change-in-prod
      DEBUG: "True"
      AUTH_SERVICE_URL: http://auth-service:8000
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started

  ticket-service:
    build: ./ticket-service
    environment:
      DATABASE_URL: postgres://admin:admin@postgres:5432/ticketing
      SECRET_KEY: super-secret-key-change-in-prod
      DEBUG: "True"
      AUTH_SERVICE_URL: http://auth-service:8000
      EVENT_SERVICE_URL: http://event-service:8000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    build: ./user-service
    environment:
      DATABASE_URL: postgres://admin:admin@postgres:5432/ticketing
      JWT_SECRET: super-secret-key-change-in-prod
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  payment-service:
    build: ./payment-service
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PORT: "3002"
    ports:
      - "3002:3002"
    depends_on:
      rabbitmq:
        condition: service_healthy

  notif-service:
    build: ./notif-service
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PORT: "3003"
    ports:
      - "3003:3003"
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ─── Gateway ──────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - event-service
      - ticket-service
      - user-service

  # ─── Frontend ─────────────────────────────────────────────────────────────

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - nginx

volumes:
  pg_data:
